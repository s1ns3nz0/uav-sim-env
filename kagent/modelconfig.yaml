apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: gpt-4o-soc
  namespace: kagent
spec:
  provider: AzureOpenAI
  # The model name kagent uses on the request. For AzureOpenAI it must match
  # the deployment name created in aoai.bicep, not the underlying model name.
  model: gpt-4o-soc
  apiKeySecret: aoai-key
  apiKeySecretKey: api-key
  azureOpenAI:
    apiVersion: "2024-08-01-preview"
    azureEndpoint: https://dah-aoai-kzjpmnfl4iwvg.openai.azure.com/
    azureDeployment: gpt-4o-soc
    temperature: "0.2"
    maxTokens: 4096
