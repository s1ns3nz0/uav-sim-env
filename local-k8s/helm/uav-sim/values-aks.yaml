# AKS 환경 오버라이드 — kind 대비 이미지 출처만 다름.
# E1 배포 후 ACR loginServer 로 registry 를 바꾸고, E2 에서 :v1 로 push.
image:
  registry: dahsimacr2kv7vfcrafu3o.azurecr.io   # dah-sim-rg 의 ACR (sim.bicep 출력)
  tag: v1
  pullPolicy: IfNotPresent

# AKS 에서 데이터패스 on (kind 는 off)
datalinkLos:
  enabled: true
  imageTag: v4                   # v4: UnexpectedEndpoint(T1557 릴레이 MITM 탐지, grilling 세션)
telemetryTap:
  enabled: true
  nodePool: sitl                 # system 풀 maxPods=30 회피
  stdoutMode: true               # 7 NDJSON 전부 /dev/stdout → FB tail 가능
  imageTag: v9                   # v9: FleetState S103/S105(pairwise거리+Sybil) + ground_truth_tap.py 동봉
  uavId: "MUAV-AKS"              # prefix 만 — 코드가 "-SYS001/002/003" 박음
gcsQgc:       { enabled: true, imageTag: v2 }   # v2: nginx access log emitter (UAVGcsAccess_CL)
fluentBit:    { enabled: true }   # AKS NDJSON → Sentinel 일원화
ingress:      { enabled: true }   # https://sim.pollak.store (cert-manager + ingress-nginx)

# H3b: system 풀 꽉 차서 ground stubs/c4i 21h Pending → sitl 로 재배치
c4i: { nodePool: sitl, logPath: /dev/stdout, imageTag: v2 }   # v2: current_operation_read 감사(T1567 — ClientIp/ResponseBytes)
groundStubsNodePool: sitl
groundStubsLogToStdout: true                    # 모든 ground 스텁 LOG_FILE_PATH=/dev/stdout
groundStubsImageTags:
  pgse-stub: v3     # v3: 모뎀/SATCOM 펌웨어 검증(T0857, grilling 세션) — v2는 T0800
  web-stub: v2      # v2: rootkit_install_attempt(T1014/T0851, S62)
  auth-stub: v2     # v2: auth_policy_changed(T1556) + account_created(T0859)
  mps-stub: v2      # v2: plan_read 조회 감사(T0845)

# counter-uas 도 system 풀은 (a) maxPods 꽉 참 (b) fluentbit affinity 밖(sitl/satcom 만 커버)
# → sitl 로 재배치해야 UAVCounterUas_CL 이 실제로 적재된다.
counterUas: { nodePool: sitl }
# service-audit 도 동일한 이유로 sitl 로 배치(신규 컴포넌트라 처음부터 올바른 풀 사용).
serviceAudit: { nodePool: sitl, imageTag: v3 }  # v3: stdout 중복 기록 버그 수정(모든 이벤트 2배 집계되던 문제)

# ground-truth-tap — 위와 동일한 이유(fluentbit affinity=sitl/satcom 만)로 처음부터 sitl.
# telemetry-tap 과 같은 이미지 재사용이므로 imageTag 도 telemetryTap 과 맞춰 둔다.
# AKS 에는 av-mpd 가 없음(편대 3대 av-muav StatefulSet 만 배포) — 최초 배포 시
# "av-mpd.air.svc.cluster.local" DNS 실패로 CrashLoop 확인, av-muav-0 로 정정.
# av-muav-0 SYSID_THISMAV=1(entrypoint `SYSID_THISMAV $((ORD+1))`) → telemetry-tap
# 이 같은 기체에 매기는 UAVId 는 "MUAV-AKS-SYS001"(uavId 접두사 + SysId suffix).
# 포트는 StatefulSet 엔트리포인트의 AV_PORT=5760+10*ORD 공식에서 ORD=0 → 5760.
groundTruthTap:
  enabled: true
  nodePool: sitl
  imageTag: v9
  uavId: "MUAV-AKS-SYS001"
  sitlTcpAddr: "tcp:av-muav-0.av-muav.air.svc.cluster.local:5760"

# AKS 출처를 표에서 구별하기 위해 UAV_ID 를 다르게 (검증용)
datalinkSatcom:
  imageTag: v3  # v3: exfil 모드 추가(T1011 — PayloadBytes 급증으로 SATCOM 대량유출 포착)
  env:
    UAV_ID: "MUAV-AKS-001"
