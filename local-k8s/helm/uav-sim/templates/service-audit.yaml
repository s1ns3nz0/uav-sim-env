{{- with .Values.serviceAudit }}
{{- if .enabled }}
# service-audit — Kubernetes Event stream(파드 생애주기) -> NDJSON -> UAVServiceAudit_CL.
# AKS 는 containerd 전용(docker.sock 없음)이라 Docker daemon events 대신 클러스터
# 전역 core/v1 Event 를 watch — get/list/watch on events 만 있으면 되는 최소 권한.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: service-audit
  namespace: soc
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: uav-service-audit }
rules:
  - apiGroups: [""]
    resources: [events]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: uav-service-audit }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: uav-service-audit }
subjects:
  - { kind: ServiceAccount, name: service-audit, namespace: soc }
---
# soc default-deny 예외 — service-audit 는 443(kube API 서버)으로 나가야 Event watch 가능.
# fluentbit-egress 와 동일 패턴(포트만 열고 목적지 제한 없음 — API 서버는 클러스터마다
# 다른 내부 주소를 쓰므로 CIDR 고정 대신 포트로만 제한).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: service-audit-egress, namespace: soc }
spec:
  podSelector: { matchLabels: { app: service-audit } }
  policyTypes: [Egress]
  egress:
    - ports: [ { protocol: TCP, port: 443 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-audit
  namespace: soc
  labels: { app: service-audit }
spec:
  replicas: 1
  selector:
    matchLabels: { app: service-audit }
  template:
    metadata:
      labels: { app: service-audit }
    spec:
      serviceAccountName: service-audit
      nodeSelector: { pool: {{ .nodePool }} }
      containers:
        - name: service-audit
          image: {{ $.Values.image.registry }}/{{ .image }}:{{ default $.Values.image.tag .imageTag }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          env:
            - { name: LOG_FILE_PATH, value: {{ default "/dev/stdout" .logPath | quote }} }
          resources:
            requests: { cpu: "50m", memory: 64Mi }
            limits:   { cpu: "200m", memory: 128Mi }
{{- end }}
{{- end }}
