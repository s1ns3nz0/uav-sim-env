# 편대 mission plan 영구 저장 — 시나리오별 ConfigMap (5개) + Deployment 의 subdir 마운트.
# QGC 의 File > Open 에서 /home/qgc/missions/<scenario>/v{N}.plan 로 직접 접근.
{{- if .Values.gcsQgc.enabled }}
{{- $scenarios := dict }}
{{- range $path, $_ := .Files.Glob "files/missions/**/*.plan" }}
  {{- $rel := trimPrefix "files/missions/" $path }}
  {{- $parts := splitList "/" $rel }}
  {{- $sc := index $parts 0 }}
  {{- $file := index $parts 1 }}
  {{- $list := index $scenarios $sc | default (dict) }}
  {{- $_ := set $list $file $path }}
  {{- $_ := set $scenarios $sc $list }}
{{- end }}
{{- range $sc, $files := $scenarios }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qgc-missions-{{ $sc }}
  namespace: ground
  labels:
    app: gcs-qgc
    mission-scenario: {{ $sc }}
data:
  {{- range $file, $path := $files }}
  {{ $file }}: |
{{ $.Files.Get $path | indent 4 }}
  {{- end }}
{{- end }}
{{- end }}
