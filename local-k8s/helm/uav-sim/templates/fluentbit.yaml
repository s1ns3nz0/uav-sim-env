{{- with .Values.fluentBit }}
{{- if .enabled }}
# Fluent Bit DaemonSet — AKS 컨테이너 stdout(NDJSON)을 읽어 Logs Ingestion API 로
# 전송 → 기존 DCR → UAV*_CL. 워크로드 ID 로 인증(soc:fluentbit SA ↔ uav-fluentbit MI).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluentbit
  namespace: soc
---
# soc default-deny 예외 — Fluent Bit 는 443으로 kube API 서버 + DCE(Logs Ingestion)에 나가야 함
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: fluentbit-egress, namespace: soc }
spec:
  podSelector: { matchLabels: { app: fluentbit } }
  policyTypes: [Egress]
  egress:
    - ports: [ { protocol: TCP, port: 443 } ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: uav-fluentbit }
rules:
  - apiGroups: [""]
    resources: [pods, namespaces]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: uav-fluentbit }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: uav-fluentbit }
subjects:
  - { kind: ServiceAccount, name: fluentbit, namespace: soc }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentbit-config
  namespace: soc
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        5
        Daemon       Off
        Log_Level    info
    {{- range .streams }}

    [INPUT]
        Name             tail
        Path             /var/log/containers/*{{ .container }}*.log
        Tag              s_{{ .container }}_{{ .stream }}.*
        multiline.parser cri
        Mem_Buf_Limit    10MB
        Skip_Long_Lines  On
        Inotify_Watcher  Off
        Refresh_Interval 5
        Read_from_Head   On

    [FILTER]
        Name             kubernetes
        Match            s_{{ .container }}_{{ .stream }}.*
        Merge_Log        On
        Keep_Log         Off
        Labels           Off
        Annotations      Off

    [FILTER]
        Name             grep
        Match            s_{{ .container }}_{{ .stream }}.*
        Regex            {{ .marker }} .+

    [OUTPUT]
        Name             azure_logs_ingestion
        Match            s_{{ .container }}_{{ .stream }}.*
        client_id        {{ $.Values.fluentBit.clientId }}
        client_secret    ${AZURE_CLIENT_SECRET}
        tenant_id        {{ $.Values.fluentBit.tenantId }}
        dce_url          {{ $.Values.fluentBit.dceUrl }}
        dcr_id           {{ .dcrId }}
        table_name       {{ .stream }}
        time_key         TimeGenerated
        time_generated   true
    {{- end }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentbit
  namespace: soc
  labels: { app: fluentbit }
spec:
  selector:
    matchLabels: { app: fluentbit }
  template:
    metadata:
      labels:
        app: fluentbit
    spec:
      serviceAccountName: fluentbit
      # 사용자 워크로드 없는 system 풀(maxPods=30 꽉 참) 은 제외 — 그쪽엔 NDJSON 흘릴
      # 컨테이너가 없어 FB 가 떠도 의미 없음. sitl+satcom 풀만 커버.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - { key: pool, operator: In, values: [sitl, satcom] }
      tolerations:
        - operator: Exists                     # 모든 노드(satcom taint 포함)에서 로그 수집
      containers:
        - name: fluentbit
          image: {{ .image }}
          args: ["--config=/fluent-bit/etc/fluent-bit.conf"]
          env:
            - name: AZURE_CLIENT_SECRET     # git 에 없음 — k8s Secret 에서 주입
              valueFrom:
                secretKeyRef:
                  name: fluentbit-azure
                  key: client-secret
          resources:
            requests: { cpu: "50m", memory: 64Mi }
            limits:   { cpu: "200m", memory: 192Mi }
          volumeMounts:
            - { name: varlog, mountPath: /var/log, readOnly: true }
            - { name: config, mountPath: /fluent-bit/etc/fluent-bit.conf, subPath: fluent-bit.conf }
      volumes:
        - { name: varlog, hostPath: { path: /var/log } }
        - { name: config, configMap: { name: fluentbit-config } }
{{- end }}
{{- end }}
