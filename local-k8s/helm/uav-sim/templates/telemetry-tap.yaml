{{- with .Values.telemetryTap }}
{{- if .enabled }}
apiVersion: v1
kind: Service
metadata:
  name: telemetry-tap
  namespace: soc
  labels: { app: telemetry-tap }
spec:
  selector: { app: telemetry-tap }
  ports:
    - { name: tap, port: 14552, targetPort: 14552, protocol: UDP }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-tap
  namespace: soc
  labels: { app: telemetry-tap }
spec:
  replicas: 1
  selector:
    matchLabels: { app: telemetry-tap }
  template:
    metadata:
      labels: { app: telemetry-tap }
    spec:
      nodeSelector: { pool: {{ .nodePool }} }
      containers:
        - name: telemetry-tap
          image: {{ $.Values.image.registry }}/{{ .image }}:{{ default $.Values.image.tag .imageTag }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          env:
            - { name: UAV_ID, value: {{ .uavId | quote }} }
            - { name: LISTEN_HOST, value: "0.0.0.0" }
            - { name: LISTEN_PORT, value: "14552" }
            {{- if .stdoutMode }}
            # LOG_FILE_PATH 비움 → tap.py 에서 _log_file_handle=None, sys.stdout.write 만.
            # 다른 6 sink 를 /dev/stdout 으로 → 7 NDJSON 이 같은 stdout 에 섞임.
            # marker: _StreamTelemetry / _StreamImagery (코드 추가) + ActionName /
            # EventName / Severity / ParamId / SignedCount (NDJSON 고유 필드).
            - { name: OPERATOR_FILE_PATH,     value: /dev/stdout }
            - { name: MISSION_FILE_PATH,      value: /dev/stdout }
            - { name: FAILSAFE_FILE_PATH,     value: /dev/stdout }
            - { name: CONFIG_AUDIT_FILE_PATH, value: /dev/stdout }
            - { name: IMAGERY_FILE_PATH,      value: /dev/stdout }
            - { name: MAVSEC_FILE_PATH,       value: /dev/stdout }
            {{- else }}
            - { name: LOG_FILE_PATH,          value: /var/log/uav-sim-env/telemetry.ndjson }
            - { name: OPERATOR_FILE_PATH,     value: /var/log/uav-sim-env/operator.ndjson }
            - { name: MISSION_FILE_PATH,      value: /var/log/uav-sim-env/mission.ndjson }
            - { name: FAILSAFE_FILE_PATH,     value: /var/log/uav-sim-env/failsafe.ndjson }
            - { name: CONFIG_AUDIT_FILE_PATH, value: /var/log/uav-sim-env/config-audit.ndjson }
            - { name: IMAGERY_FILE_PATH,      value: /var/log/uav-sim-env/imagery.ndjson }
            - { name: MAVSEC_FILE_PATH,       value: /var/log/uav-sim-env/mavsec.ndjson }
            {{- end }}
            - { name: MAVSEC_INTERVAL_SEC,  value: "30" }
          ports:
            - { name: tap, containerPort: 14552, protocol: UDP }
          volumeMounts:
            - { name: logs, mountPath: /var/log/uav-sim-env }
          resources:
            requests: { cpu: "50m", memory: 64Mi }
            limits:   { cpu: "250m", memory: 128Mi }
      volumes:
        - name: logs
          emptyDir: {}
{{- end }}
{{- end }}
