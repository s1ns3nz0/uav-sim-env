{{- with .Values.avMuav }}
{{- if .enabled }}
apiVersion: v1
kind: Service
metadata:
  name: av-muav
  namespace: air
  labels: { app: av-muav }
spec:
  clusterIP: None
  selector: { app: av-muav }
  ports: [ { name: mavlink, port: 5770, targetPort: 5770 } ]
---
# 안정 ClusterIP — datalink-los(mavlink-router)가 SITL TCP 5770 에 붙는 대상.
# (헤드리스는 pod IP 라 재시작 시 변동 → 라우터 conf 용으로는 ClusterIP 사용)
apiVersion: v1
kind: Service
metadata:
  name: av-muav-mav
  namespace: air
  labels: { app: av-muav }
spec:
  selector: { app: av-muav }
  ports: [ { name: mavlink, port: 5770, targetPort: 5770 } ]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: av-muav
  namespace: air
  labels: { app: av-muav }
spec:
  serviceName: av-muav
  replicas: {{ .replicas }}
  # 편대 부팅 시간 단축 — 직렬(OrderedReady) 이면 3대 ~5분 → 동시 시작 ~2분.
  # 같은 노드면 containerd image pull dedup 으로 한 번만 받음.
  podManagementPolicy: Parallel
  selector:
    matchLabels: { app: av-muav }
  template:
    metadata:
      labels: { app: av-muav }
    spec:
      nodeSelector: { pool: {{ .nodePool }} }
      containers:
        - name: sitl
          image: {{ $.Values.image.registry }}/{{ .image }}:{{ $.Values.image.tag }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          # pod ordinal(av-muav-N 의 N) 기반으로 INSTANCE/HOME/router port 동적.
          # SITL 의 mavlink TCP listen port = 5760 + 10*INSTANCE 이므로 bootstrap
          # 도 그 port 로 따라가야 ARMING_CHECK 등 param 패치가 정확히 붙는다.
          command: ["bash", "-c"]
          args:
            - |
              ORD=${HOSTNAME##*-}
              export INSTANCE=$ORD
              PORT=$((5760 + 10*ORD))
              export BOOTSTRAP_ROUTER_TCP="tcp:127.0.0.1:${PORT}"
              # HOME = base + ordinal * 작은 offset (편대원끼리 살짝 떨어뜨림)
              export HOME_LAT=$(awk -v b="$HOME_LAT_BASE" -v o="$ORD" 'BEGIN{printf "%.6f", b + o*0.0008}')
              export HOME_LON=$(awk -v b="$HOME_LON_BASE" -v o="$ORD" 'BEGIN{printf "%.6f", b + o*0.0008}')
              # SITL -I 가 SYSID_THISMAV 자동 분리 안 함 → persona 에 SYSID override 추가.
              # 합본 임시 파일 만들고 PERSONA_PARAM 가리키게. 모든 vehicle SysId = ORD+1.
              FLEET_PARAM=/tmp/fleet-${ORD}.parm
              echo "SYSID_THISMAV $((ORD+1))" > $FLEET_PARAM
              cat "$PERSONA_PARAM" >> $FLEET_PARAM
              export PERSONA_PARAM=$FLEET_PARAM
              echo "[av-muav] ORD=$ORD INSTANCE=$INSTANCE PORT=$PORT SysId=$((ORD+1)) HOME=$HOME_LAT,$HOME_LON"
              exec /home/sitl/entrypoint.sh
          env:
            - { name: VEHICLE, value: ArduPlane }
            - { name: FRAME, value: {{ .frame | quote }} }
            - { name: PERSONA_PARAM, value: {{ .persona | quote }} }
            - { name: HOME_LAT_BASE, value: {{ .home.lat | quote }} }
            - { name: HOME_LON_BASE, value: {{ .home.lon | quote }} }
            - { name: HOME_ALT, value: {{ .home.alt | quote }} }
            - { name: HOME_HEADING, value: {{ .home.heading | quote }} }
          # SITL port 가 ordinal 별 다름 — readiness 도 동적으로 그 port 검사.
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - 'ORD=${HOSTNAME##*-}; ss -tln | grep -q ":$((5760+10*ORD)) "'
            initialDelaySeconds: 40
            periodSeconds: 10
          resources:
            {{- toYaml .resources | nindent 12 }}
{{- end }}
{{- end }}
