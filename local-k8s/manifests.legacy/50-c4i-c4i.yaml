# c4i — c4i-stub: ATCIS/MIMS 핸드오프 종단. 노드풀: system.
apiVersion: v1
kind: Service
metadata:
  name: c4i-stub
  namespace: c4i
  labels:
    app: c4i-stub
spec:
  selector:
    app: c4i-stub
  ports:
    - name: http
      port: 8200
      targetPort: 8200
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c4i-stub
  namespace: c4i
  labels:
    app: c4i-stub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: c4i-stub
  template:
    metadata:
      labels:
        app: c4i-stub
    spec:
      nodeSelector:
        pool: system
      containers:
        - name: c4i-stub
          image: uavsim/c4i:local
          imagePullPolicy: IfNotPresent
          env:
            - { name: LOG_FILE_PATH, value: /var/log/uav-sim-env/c4i.ndjson }
          ports:
            - name: http
              containerPort: 8200
          readinessProbe:
            httpGet:
              path: /health
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: logs
              mountPath: /var/log/uav-sim-env
          resources:
            requests: { cpu: "50m", memory: 64Mi }
            limits: { cpu: "250m", memory: 128Mi }
      volumes:
        - name: logs
          emptyDir: {}
