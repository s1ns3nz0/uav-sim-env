# 신뢰경계 강제 = NetworkPolicy (Calico 가 실제 강제).
#
# 실제 UAS 정수: "공중→지상 경로는 RF/위성 링크(datalink)뿐".
# 각 네임스페이스를 기본 차단(default-deny)하고, 다음 체인만 화이트리스트한다:
#
#     air ──▶ link ──▶ ground ──▶ c4i        (soc 는 관측용으로 각 plane 으로 egress)
#
# 주의: default-deny egress 를 걸면 DNS 도 막히므로 각 ns 에 allow-dns 를 반드시 둔다.
# ─────────────────────────────────────────────────────────────────────────────

# ===== air =====
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: air
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: air
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# 공중 → 데이터링크(link)로만 egress 허용. ground 직행 불가.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: air-egress-to-link
  namespace: air
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              plane: link
---
# ===== link (datalink 게이트웨이) =====
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: link
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: link
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# air 로부터의 ingress 허용 (공중→링크).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: link-ingress-from-air
  namespace: link
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              plane: air
---
# link → ground egress 허용 (링크가 지상통제로 전달).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: link-egress-to-ground
  namespace: link
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              plane: ground
---
# ===== ground (GCS/스텁) =====
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: ground
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: ground
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ground-ingress-from-link
  namespace: ground
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              plane: link
---
# ground → c4i egress (공군→육군 핸드오프 게이트웨이 모사).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ground-egress-to-c4i
  namespace: ground
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              plane: c4i
---
# ===== c4i (ATCIS/MIMS 핸드오프 종단) =====
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: c4i
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: c4i
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: c4i-ingress-from-ground
  namespace: c4i
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              plane: ground
---
# ===== soc (out-of-band 관측) =====
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: soc
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: soc
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# soc → 각 plane 으로 관측 egress (텔레메트리 수집). ingress 는 없음(out-of-band).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: soc-egress-observe
  namespace: soc
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: plane
                operator: In
                values: [air, link, ground, c4i]
