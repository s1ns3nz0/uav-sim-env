# ArgoCD Application — uav-sim Helm 차트를 AKS(dah-sim-aks)에 GitOps 로 배포.
# 적용 후 git 에 push 한 변경은 ArgoCD 가 자동 sync (selfHeal/prune).
#
#   kubectl apply -f gitops/application-uav-sim.yaml
#
# 전제: ArgoCD 설치됨, 차트의 values-aks.yaml 의 image.registry 가 실제 ACR 로 치환됨,
#       E2 에서 이미지가 ACR 에 :v1 로 push 됨.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uav-sim
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/s1ns3nz0/uav-sim-env.git
    targetRevision: main
    path: local-k8s/helm/uav-sim
    helm:
      valueFiles:
        - values.yaml
        - values-aks.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default          # Helm release 기본 ns (리소스는 각자 namespace 지정)
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false   # 차트가 Namespace 를 직접 생성
      - ServerSideApply=true
    retry:
      limit: 5
      backoff: { duration: 10s, factor: 2, maxDuration: 3m }
