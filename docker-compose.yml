name: uav-sim-env

services:
  av-mpd:
    build:
      context: ./av-mpd
    container_name: uav-av-mpd
    hostname: av-mpd
    networks:
      uas-los:
        ipv4_address: 10.50.0.10
    environment:
      VEHICLE: ArduPlane
      FRAME: quadplane
      INSTANCE: "0"
      MAVLINK_OUT_HOST: datalink-los
      MAVLINK_OUT_PORT: "14550"
      HOME_LAT: "37.5326"
      HOME_LON: "127.0246"
      HOME_ALT: "50"
      HOME_HEADING: "0"
    ports:
      - "5760:5760"
    depends_on:
      - datalink-los
    restart: unless-stopped

  datalink-los:
    build:
      context: ./datalink-los
    container_name: uav-datalink-los
    hostname: datalink-los
    networks:
      uas-los:
        ipv4_address: 10.50.0.20
    cap_add:
      - NET_ADMIN
    environment:
      LINK_DELAY_MS: "50"
      LINK_LOSS_PCT: "1"
      LINK_JITTER_MS: "5"
      ENDPOINT_AV: "av-mpd:14550"
      ENDPOINT_GCS: "gcs-qgc:14550"
      ENDPOINT_TAP: "10.50.0.255:14552"
    ports:
      - "14550:14550/udp"
      - "14552:14552/udp"
      - "5790:5790/tcp"
    restart: unless-stopped

  telemetry-tap:
    build:
      context: ./telemetry-tap
    container_name: uav-telemetry-tap
    hostname: telemetry-tap
    networks:
      uas-los:
        ipv4_address: 10.50.0.40
    environment:
      UAV_ID: "MPD-001"
      LISTEN_HOST: "0.0.0.0"
      LISTEN_PORT: "14552"
      LOG_FILE_PATH: "/var/log/uav-sim-env/telemetry.ndjson"
      OPERATOR_FILE_PATH: "/var/log/uav-sim-env/operator.ndjson"
      MISSION_FILE_PATH: "/var/log/uav-sim-env/mission.ndjson"
      FAILSAFE_FILE_PATH: "/var/log/uav-sim-env/failsafe.ndjson"
      CONFIG_AUDIT_FILE_PATH: "/var/log/uav-sim-env/config-audit.ndjson"
      IMAGERY_FILE_PATH: "/var/log/uav-sim-env/imagery.ndjson"
      MAVSEC_FILE_PATH: "/var/log/uav-sim-env/mavsec.ndjson"
      MAVSEC_INTERVAL_SEC: "30"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    depends_on:
      - datalink-los
    restart: unless-stopped

  service-audit:
    build:
      context: ./service-audit
    container_name: uav-service-audit
    hostname: service-audit
    environment:
      LOG_FILE_PATH: "/var/log/uav-sim-env/service-audit.ndjson"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    restart: unless-stopped

  mps-stub:
    build:
      context: ./mps-stub
    container_name: uav-mps-stub
    hostname: mps-stub
    networks:
      uas-los:
        ipv4_address: 10.50.0.60
    environment:
      LOG_FILE_PATH: "/var/log/uav-sim-env/mps.ndjson"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8100:8100"
    restart: unless-stopped

  datalink-stats:
    build:
      context: ./datalink-stats
    container_name: uav-datalink-stats
    hostname: datalink-stats
    environment:
      TARGET_CONTAINER: "uav-datalink-los"
      POLL_INTERVAL: "30"
      LOG_FILE_PATH: "/var/log/uav-sim-env/datalink-stats.ndjson"
      RESOURCE_FILE_PATH: "/var/log/uav-sim-env/resource-metrics.ndjson"
      CONN_FILE_PATH: "/var/log/uav-sim-env/datalink-conn.ndjson"
      PROJECT_LABEL: "uav-sim-env"
      CONN_PORTS: "5760,5790,14550,14551,14552"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    restart: unless-stopped

  c4i-stub:
    build:
      context: ./c4i-stub
    container_name: uav-c4i-stub
    hostname: c4i-stub
    networks:
      uas-los:
        ipv4_address: 10.50.0.70
    environment:
      LOG_FILE_PATH: "/var/log/uav-sim-env/c4i.ndjson"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8200:8200"
    restart: unless-stopped

  cyber-posture-stub:
    build:
      context: ./cyber-posture-stub
    container_name: uav-cyber-posture-stub
    hostname: cyber-posture-stub
    networks:
      uas-los:
        ipv4_address: 10.50.0.80
    environment:
      LOG_FILE_PATH: "/var/log/uav-sim-env/cyber-posture.ndjson"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8300:8300"
    restart: unless-stopped

  weapon-stub:
    build:
      context: ./weapon-stub
    container_name: uav-weapon-stub
    hostname: weapon-stub
    networks:
      uas-los:
        ipv4_address: 10.50.0.90
    environment:
      LOG_FILE_PATH: "/var/log/uav-sim-env/weapon.ndjson"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8400:8400"
    restart: unless-stopped

  ti-stub:
    build:
      context: ./ti-stub
    container_name: uav-ti-stub
    hostname: ti-stub
    networks:
      uas-los:
        ipv4_address: 10.50.0.100
    environment:
      LOG_FILE_PATH: "/var/log/uav-sim-env/ti.ndjson"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8500:8500"
    restart: unless-stopped

  auth-stub:
    build:
      context: ./auth-stub
    container_name: uav-auth-stub
    hostname: auth-stub
    networks:
      uas-los:
        ipv4_address: 10.50.0.110
    environment:
      LOG_FILE_PATH: "/var/log/uav-sim-env/auth.ndjson"
      SESSION_TTL_SEC: "3600"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8600:8600"
    restart: unless-stopped

  pgse-stub:
    build:
      context: ./pgse-stub
    container_name: uav-pgse-stub
    hostname: pgse-stub
    networks:
      uas-los:
        ipv4_address: 10.50.0.50
    environment:
      APPROVED_DB: "/data/approved_firmware.json"
      TOKEN_TTL_SEC: "300"
      LOG_FILE_PATH: "/var/log/uav-sim-env/pgse.ndjson"
      MAINT_FILE_PATH: "/var/log/uav-sim-env/maintenance.ndjson"
    volumes:
      - ./pgse-stub/data:/data:ro
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8000:8000"
    restart: unless-stopped

  gcs-qgc:
    build:
      context: ./gcs-qgc
    platform: linux/amd64
    container_name: uav-gcs-qgc
    hostname: gcs-qgc
    networks:
      uas-los:
        ipv4_address: 10.50.0.30
    environment:
      MAVLINK_IN_PORT: "14550"
      VNC_PASSWORD: "uavsim"
      DISPLAY: ":0"
    ports:
      - "8080:8080"
      - "5900:5900"
    depends_on:
      - datalink-los
    shm_size: "512m"
    restart: unless-stopped

networks:
  uas-los:
    driver: bridge
    ipam:
      config:
        - subnet: 10.50.0.0/24
