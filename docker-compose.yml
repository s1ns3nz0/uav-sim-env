name: uav-sim-env

services:
  av-mpd:
    build:
      context: ./av-mpd
    image: uavsim/av:local
    container_name: uav-av-mpd
    hostname: av-mpd
    networks:
      uas-los:
        ipv4_address: 10.50.0.10
    environment:
      VEHICLE: ArduPlane
      FRAME: quadplane
      INSTANCE: "0"
      MAVLINK_OUT_HOST: datalink-los
      MAVLINK_OUT_PORT: "14550"
      HOME_LAT: "37.5326"
      HOME_LON: "127.0246"
      HOME_ALT: "50"
      HOME_HEADING: "0"
    ports:
      - "5760:5760"
    depends_on:
      - datalink-los
    restart: unless-stopped

  # KUS-FS (Group 4, MALE 고정익) — av-mpd 와 동일 이미지 재사용, persona/frame 만 교체.
  # NOTE(Phase): 현재는 standalone SITL 부팅 검증용. LOS(C-band)+SATCOM(Ku/Ka) 데이터링크
  #   정식 라우팅은 datalink-satcom(OpenSAND) 단계(B3)에서 연결된다. 그 전까지는
  #   bootstrap 이 자기 로컬 SITL(127.0.0.1:5770)로 ARMING_CHECK 를 푼다.
  av-muav:
    # profile 로 분리 — 기본 `docker compose up -d`(VM systemd) 에는 안 뜬다.
    # 로컬 테스트는 `docker compose --profile muav up -d av-muav` 또는 서비스명 직접 지정.
    # (av-muav 는 AKS/local-k8s 경로용. VM 에 두 번째 SITL 부하 방지.)
    profiles: ["muav"]
    build:
      context: ./av-mpd
    image: uavsim/av:local
    container_name: uav-av-muav
    hostname: av-muav
    networks:
      uas-los:
        ipv4_address: 10.50.0.11
    environment:
      VEHICLE: ArduPlane
      FRAME: plane
      INSTANCE: "1"
      PERSONA_PARAM: /home/sitl/persona/muav_male.parm
      BOOTSTRAP_ROUTER_TCP: "tcp:127.0.0.1:5770"
      MAVLINK_OUT_HOST: datalink-los
      MAVLINK_OUT_PORT: "14550"
      HOME_LAT: "37.4030"
      HOME_LON: "127.1060"
      HOME_ALT: "300"
      HOME_HEADING: "0"
    ports:
      - "5770:5770"
    restart: unless-stopped

  datalink-los:
    build:
      context: ./datalink-los
    container_name: uav-datalink-los
    hostname: datalink-los
    networks:
      uas-los:
        ipv4_address: 10.50.0.20
    cap_add:
      - NET_ADMIN
    environment:
      LINK_DELAY_MS: "50"
      LINK_LOSS_PCT: "1"
      LINK_JITTER_MS: "5"
      ENDPOINT_AV: "av-mpd:14550"
      ENDPOINT_GCS: "gcs-qgc:14550"
      ENDPOINT_TAP: "10.50.0.255:14552"
    ports:
      - "14550:14550/udp"
      - "14552:14552/udp"
      - "5790:5790/tcp"
    restart: unless-stopped

  # BLOS SATCOM link (KUS-FS MUAV) — Phase B 태깅 계층. 위성 링크 신호(세션/시퀀스/
  # 서명/RTT/재밍)를 satcom.ndjson 으로 emit → UAVSatcomLink_CL. S3 시나리오 진입점.
  # NOTE: OpenSAND 물리계층(ST/SAT/GW)은 이후 단계에서 이 서비스에 끼워넣는다.
  #   av-muav MAVLink 의 위성 경로 터널링도 그때 연결. 현재는 링크-계층 메타만.
  datalink-satcom:
    build:
      context: ./datalink-satcom
    container_name: uav-datalink-satcom
    hostname: datalink-satcom
    networks:
      uas-los:
        ipv4_address: 10.50.0.21
    environment:
      UAV_ID: "MUAV-001"
      LINK_ID: "KU-LINK-1"
      GEO_RTT_MS: "600"
      EMIT_INTERVAL_SEC: "5"
      SRC_ADDR: "10.60.0.10"
      DST_ADDR: "10.60.0.20"
      LOG_FILE_PATH: "/var/log/uav-sim-env/satcom.ndjson"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8800:8800"
    restart: unless-stopped

  telemetry-tap:
    build:
      context: ./telemetry-tap
    container_name: uav-telemetry-tap
    hostname: telemetry-tap
    networks:
      uas-los:
        ipv4_address: 10.50.0.40
    environment:
      UAV_ID: "MPD-001"
      LISTEN_HOST: "0.0.0.0"
      LISTEN_PORT: "14552"
      LOG_FILE_PATH: "/var/log/uav-sim-env/telemetry.ndjson"
      OPERATOR_FILE_PATH: "/var/log/uav-sim-env/operator.ndjson"
      MISSION_FILE_PATH: "/var/log/uav-sim-env/mission.ndjson"
      FAILSAFE_FILE_PATH: "/var/log/uav-sim-env/failsafe.ndjson"
      CONFIG_AUDIT_FILE_PATH: "/var/log/uav-sim-env/config-audit.ndjson"
      IMAGERY_FILE_PATH: "/var/log/uav-sim-env/imagery.ndjson"
      MAVSEC_FILE_PATH: "/var/log/uav-sim-env/mavsec.ndjson"
      MAVSEC_INTERVAL_SEC: "30"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    depends_on:
      - datalink-los
    restart: unless-stopped

  service-audit:
    build:
      context: ./service-audit
    container_name: uav-service-audit
    hostname: service-audit
    environment:
      LOG_FILE_PATH: "/var/log/uav-sim-env/service-audit.ndjson"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    restart: unless-stopped

  mps-stub:
    build:
      context: ./mps-stub
    container_name: uav-mps-stub
    hostname: mps-stub
    networks:
      uas-los:
        ipv4_address: 10.50.0.60
    environment:
      LOG_FILE_PATH: "/var/log/uav-sim-env/mps.ndjson"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8100:8100"
    restart: unless-stopped

  datalink-stats:
    build:
      context: ./datalink-stats
    container_name: uav-datalink-stats
    hostname: datalink-stats
    environment:
      TARGET_CONTAINER: "uav-datalink-los"
      POLL_INTERVAL: "30"
      LOG_FILE_PATH: "/var/log/uav-sim-env/datalink-stats.ndjson"
      RESOURCE_FILE_PATH: "/var/log/uav-sim-env/resource-metrics.ndjson"
      CONN_FILE_PATH: "/var/log/uav-sim-env/datalink-conn.ndjson"
      PROJECT_LABEL: "uav-sim-env"
      CONN_PORTS: "5760,5790,14550,14551,14552"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    restart: unless-stopped

  c4i-stub:
    build:
      context: ./c4i-stub
    container_name: uav-c4i-stub
    hostname: c4i-stub
    networks:
      uas-los:
        ipv4_address: 10.50.0.70
    environment:
      LOG_FILE_PATH: "/var/log/uav-sim-env/c4i.ndjson"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8200:8200"
    restart: unless-stopped

  cyber-posture-stub:
    build:
      context: ./cyber-posture-stub
    container_name: uav-cyber-posture-stub
    hostname: cyber-posture-stub
    networks:
      uas-los:
        ipv4_address: 10.50.0.80
    environment:
      LOG_FILE_PATH: "/var/log/uav-sim-env/cyber-posture.ndjson"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8300:8300"
    restart: unless-stopped

  weapon-stub:
    build:
      context: ./weapon-stub
    container_name: uav-weapon-stub
    hostname: weapon-stub
    networks:
      uas-los:
        ipv4_address: 10.50.0.90
    environment:
      LOG_FILE_PATH: "/var/log/uav-sim-env/weapon.ndjson"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8400:8400"
    restart: unless-stopped

  ti-stub:
    build:
      context: ./ti-stub
    container_name: uav-ti-stub
    hostname: ti-stub
    networks:
      uas-los:
        ipv4_address: 10.50.0.100
    environment:
      LOG_FILE_PATH: "/var/log/uav-sim-env/ti.ndjson"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8500:8500"
    restart: unless-stopped

  auth-stub:
    build:
      context: ./auth-stub
    container_name: uav-auth-stub
    hostname: auth-stub
    networks:
      uas-los:
        ipv4_address: 10.50.0.110
    environment:
      LOG_FILE_PATH: "/var/log/uav-sim-env/auth.ndjson"
      SESSION_TTL_SEC: "3600"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8600:8600"
    restart: unless-stopped

  # SAR payload surface (KUS-FS MUAV) — SAR 프레임 메타 emit → UAVSarPayload_CL.
  sar-stub:
    build:
      context: ./sar-stub
    container_name: uav-sar-stub
    hostname: sar-stub
    networks:
      uas-los:
        ipv4_address: 10.50.0.120
    environment:
      LOG_FILE_PATH: "/var/log/uav-sim-env/sar.ndjson"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8700:8700"
    restart: unless-stopped

  pgse-stub:
    build:
      context: ./pgse-stub
    container_name: uav-pgse-stub
    hostname: pgse-stub
    networks:
      uas-los:
        ipv4_address: 10.50.0.50
    environment:
      APPROVED_DB: "/data/approved_firmware.json"
      TOKEN_TTL_SEC: "300"
      LOG_FILE_PATH: "/var/log/uav-sim-env/pgse.ndjson"
      MAINT_FILE_PATH: "/var/log/uav-sim-env/maintenance.ndjson"
    volumes:
      - ./pgse-stub/data:/data:ro
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8000:8000"
    restart: unless-stopped

  web-stub:
    build:
      context: ./web-stub
    container_name: uav-web-stub
    hostname: web-stub
    networks:
      uas-los:
        ipv4_address: 10.50.0.130
    environment:
      LOG_FILE_PATH: "/var/log/uav-sim-env/web.ndjson"
      ARCHIVE_LOG_FILE_PATH: "/var/log/uav-sim-env/web-archive.ndjson"
    volumes:
      - /var/log/uav-sim-env:/var/log/uav-sim-env
    ports:
      - "8900:8900"
    restart: unless-stopped

  gcs-qgc:
    # profile 로 분리 — GCS 는 이제 AKS(gcs-qgc-lb, sim.pollak.store)가 서빙.
    # VM 기본 `docker compose up -d`(systemd)에는 안 뜬다. 로컬에서 굳이 띄우려면
    # `docker compose --profile gcs up -d gcs-qgc`.
    profiles: ["gcs"]
    build:
      context: ./gcs-qgc
    platform: linux/amd64
    container_name: uav-gcs-qgc
    hostname: gcs-qgc
    networks:
      uas-los:
        ipv4_address: 10.50.0.30
    environment:
      MAVLINK_IN_PORT: "14550"
      VNC_PASSWORD: "uavsim"
      DISPLAY: ":0"
    ports:
      - "8080:8080"
      - "5900:5900"
    depends_on:
      - datalink-los
    shm_size: "512m"
    restart: unless-stopped

networks:
  uas-los:
    driver: bridge
    ipam:
      config:
        - subnet: 10.50.0.0/24
