worker_processes 1;
# daemon off 는 supervisord 가 -g 'daemon off;' 로 주입 — 여기서 박으면 중복 emerg.
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # X-Forwarded-For 우선, 없으면 직접 peer
    map $http_x_forwarded_for $real_client_ip {
        ""      $remote_addr;
        default $http_x_forwarded_for;
    }

    # 세션 식별: 쿠키 sessid > 익명(IP fallback)
    map $cookie_sessid $session_id {
        ""      "anon-$remote_addr";
        default $cookie_sessid;
    }

    map $remote_user $operator {
        ""      "unknown";
        default $remote_user;
    }

    # status 2xx/3xx 만 ok
    map $status $gcs_result {
        ~^[123]  "ok";
        default  "fail";
    }

    # WebSocket Upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # UAVGcsAccess_CL 스키마. marker = Transport.
    log_format gcs_ndjson escape=json '{'
        '"TimeGenerated":"$time_iso8601",'
        '"SessionId":"$session_id",'
        '"ClientIp":"$real_client_ip",'
        '"Transport":"$transport",'
        '"Operator":"$operator",'
        '"Action":"$gcs_action",'
        '"UserAgent":"$http_user_agent",'
        '"BytesSent":$body_bytes_sent,'
        '"BytesReceived":$request_length,'
        '"DurationSec":$request_time,'
        '"Result":"$gcs_result"'
    '}';

    access_log /dev/stdout gcs_ndjson;
    sendfile on;
    keepalive_timeout 65;

    upstream novnc_upstream {
        server 127.0.0.1:8081;
    }

    server {
        listen 8080 default_server;
        server_name _;

        # noVNC WebSocket (connect)
        location /websockify {
            set $transport "novnc";
            set $gcs_action "connect";
            proxy_pass http://novnc_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # noVNC UI assets
        location / {
            set $transport "novnc";
            set $gcs_action "request";
            proxy_pass http://novnc_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
