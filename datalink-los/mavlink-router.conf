# mavlink-router config — LOS RF emulation router
# AV (av-mpd) → router → GCS (gcs-qgc) + TAP (telemetry-tap, Phase 2)

[General]
TcpServerPort=5790
ReportStats=true
MavlinkDialect=common
Log=/tmp/mavlink-router.log
LogMode=while-armed

# AV inbound (drone telemetry)
[UdpEndpoint av_in]
Mode=Server
Address=0.0.0.0
Port=14550

# GCS outbound (QGroundControl reads from here)
[UdpEndpoint gcs_out]
Mode=Server
Address=0.0.0.0
Port=14551

# Telemetry tap (Phase 2 — Sentinel ingest hook)
[UdpEndpoint tap_out]
Mode=Normal
Address=10.50.0.255
Port=14552
