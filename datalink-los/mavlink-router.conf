# mavlink-router config — LOS RF emulation router
# AV (av-mpd) → router → GCS (gcs-qgc) + TAP (telemetry-tap, Phase 2)

[General]
TcpServerPort=5790
ReportStats=true
MavlinkDialect=common
Log=/tmp/mavlink-router.log
LogMode=while-armed

# AV inbound (drone telemetry)
[UdpEndpoint av_in]
Mode=Server
Address=0.0.0.0
Port=14550

# GCS outbound — QGroundControl autoconnect listens on UDP 14550 on its own side.
# Router pushes packets to gcs-qgc:14550 in client mode.
[UdpEndpoint gcs_out]
Mode=Normal
Address=gcs-qgc
Port=14550

# Telemetry tap (Phase 2 — Sentinel ingest hook)
[UdpEndpoint tap_out]
Mode=Normal
Address=10.50.0.255
Port=14552
