# mavlink-router config — LOS RF emulation router
# AV (av-mpd) → router → GCS (gcs-qgc) + TAP (telemetry-tap, Phase 2)

[General]
TcpServerPort=5790
ReportStats=true
MavlinkDialect=common
Log=/tmp/mavlink-router.log
LogMode=while-armed

# mavlink-router does NOT resolve hostnames in endpoint Address — use static IPs
# from docker-compose.yml uas-los subnet (av-mpd=10.50.0.10, gcs-qgc=10.50.0.30).

# AV inbound — connect to ArduPilot SITL TCP server (default port 5760)
[TcpEndpoint av_in]
Address=10.50.0.10
Port=5760
RetryTimeout=3

# GCS outbound — QGroundControl autoconnect listens on UDP 14550 on its own side.
# Router pushes packets to gcs-qgc:14550 in client mode.
[UdpEndpoint gcs_out]
Mode=Normal
Address=10.50.0.30
Port=14550

# Telemetry tap — forwarded to telemetry-tap service (NDJSON → Sentinel)
[UdpEndpoint tap_out]
Mode=Normal
Address=10.50.0.40
Port=14552
