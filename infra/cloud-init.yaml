#cloud-config
# uav-sim-env VM bootstrap.
#
# Positional format substitutions (filled in by main.bicep before encoding):
#   {{0}} = admin Linux username
#   {{1}} = git repository URL
#   {{2}} = git branch
#
# The systemd unit handles building and starting Compose so that cloud-init
# itself does not block on the long (~30 min) image build. Operators can SSH
# in and `journalctl -u uav-sim-env.service -f` to watch progress.

package_update: true
packages:
  - ca-certificates
  - curl
  - git
  - gnupg
  - jq
  - lsb-release

write_files:
  - path: /opt/uav-sim-env-config.env
    permissions: '0644'
    content: |
      GIT_REPO_URL={1}
      GIT_BRANCH={2}
      ADMIN_USER={0}

  - path: /usr/local/bin/uav-sim-env-up
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      source /opt/uav-sim-env-config.env
      cd /opt/uav-sim-env
      git fetch --all --quiet
      git checkout "$GIT_BRANCH" --quiet
      git pull --ff-only --quiet
      docker compose pull --ignore-buildable || true
      docker compose build
      docker compose up -d

  - path: /etc/systemd/system/uav-sim-env.service
    permissions: '0644'
    content: |
      [Unit]
      Description=UAV sim env (Docker Compose)
      Requires=docker.service
      After=docker.service network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      EnvironmentFile=/opt/uav-sim-env-config.env
      ExecStart=/usr/local/bin/uav-sim-env-up
      ExecStop=/usr/bin/docker compose -f /opt/uav-sim-env/docker-compose.yml down
      TimeoutStartSec=3600

      [Install]
      WantedBy=multi-user.target

runcmd:
  - curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
  - sh /tmp/get-docker.sh
  - usermod -aG docker {0}
  - source /opt/uav-sim-env-config.env && git clone --branch "$GIT_BRANCH" "$GIT_REPO_URL" /opt/uav-sim-env
  - chown -R {0}:{0} /opt/uav-sim-env
  - systemctl daemon-reload
  - systemctl enable --now uav-sim-env.service
